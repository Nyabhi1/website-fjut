<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访客通行证</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top, rgba(226, 237, 251, 0.92), rgba(212, 220, 241, 0.9) 52%, rgba(204, 209, 233, 0.96)),
        linear-gradient(180deg, #eef3ff, #d8ddef);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .preview {
      width: min(100%, 430px);
      display: flex;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 28px;
      box-shadow: 0 28px 48px rgba(67, 85, 132, 0.16);
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main class="preview">
    <canvas id="passCanvas" width="1206" height="2808" aria-label="访客通行证"></canvas>
  </main>

  <script>
    const canvas = document.getElementById("passCanvas");
    const ctx = canvas.getContext("2d");

    const bgImage = new Image();
    const avatarImage = new Image();

    bgImage.decoding = "async";
    avatarImage.decoding = "async";

    bgImage.src = "./bg.jpg";
    avatarImage.src = "./zyx.jpg";

    const FONT_STACK = '"Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';

    function roundRectPath(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    }

    function fillRoundRect(context, x, y, width, height, radius, fillStyle) {
      context.save();
      roundRectPath(context, x, y, width, height, radius);
      context.fillStyle = fillStyle;
      context.fill();
      context.restore();
    }

    function shadowCard(context, x, y, width, height, radius, fillStyle) {
      context.save();
      context.shadowColor = "rgba(111, 126, 166, 0.12)";
      context.shadowBlur = 24;
      context.shadowOffsetY = 8;
      roundRectPath(context, x, y, width, height, radius);
      context.fillStyle = fillStyle;
      context.fill();
      context.restore();
    }

    function drawCircleImage(context, image, cx, cy, radius) {
      const sourceWidth = image.width;
      const sourceHeight = image.height;
      const cropSize = sourceWidth;
      const cropX = 0;
      const cropY = Math.max(0, Math.min(sourceHeight - cropSize, 20));

      context.save();
      context.beginPath();
      context.arc(cx, cy, radius, 0, Math.PI * 2);
      context.closePath();
      context.clip();
      context.drawImage(
        image,
        cropX,
        cropY,
        cropSize,
        cropSize,
        cx - radius,
        cy - radius,
        radius * 2,
        radius * 2
      );
      context.restore();
    }

    function drawClockIcon(context, x, y, size) {
      context.save();
      context.translate(x, y);
      context.strokeStyle = "#68BFE0";
      context.lineWidth = 4;
      context.lineCap = "round";

      context.beginPath();
      context.arc(0, 0, size, 0, Math.PI * 2);
      context.stroke();

      context.beginPath();
      context.moveTo(0, 0);
      context.lineTo(0, -size * 0.48);
      context.moveTo(0, 0);
      context.lineTo(size * 0.42, 0);
      context.stroke();

      context.restore();
    }

    function drawArrow(context, x, y) {
      context.save();
      context.translate(x, y);
      context.strokeStyle = "#B4B9C8";
      context.lineWidth = 6;
      context.lineCap = "round";
      context.lineJoin = "round";
      context.beginPath();
      context.moveTo(-16, -22);
      context.lineTo(8, 0);
      context.lineTo(-16, 22);
      context.stroke();
      context.restore();
    }

    function formatDateLines(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");

      return {
        top: `${year}-${month}-`,
        bottom: `${day} ${hours}:${minutes}`
      };
    }

    function fitFontSize(context, text, startSize, minSize, maxWidth) {
      for (let size = startSize; size >= minSize; size -= 1) {
        context.font = `700 ${size}px ${FONT_STACK}`;
        if (context.measureText(text).width <= maxWidth) {
          return size;
        }
      }

      return minSize;
    }

    function drawAvatarSection(context, timestamp) {
      context.save();
      context.fillStyle = "#FDFEFF";
      context.fillRect(250, 350, 710, 560);
      context.restore();

      const centerX = 603;
      const centerY = 566;
      const dashOffset = -(timestamp * 0.08);

      context.save();
      context.strokeStyle = "#8BBEF9";
      context.lineWidth = 5;
      context.setLineDash([10, 13]);
      context.lineDashOffset = dashOffset;
      context.beginPath();
      context.arc(centerX, centerY, 147, 0, Math.PI * 2);
      context.stroke();
      context.setLineDash([]);

      context.fillStyle = "#FFFFFF";
      context.beginPath();
      context.arc(centerX, centerY, 135, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = "#DCEEFF";
      context.strokeStyle = "#55A5F7";
      context.lineWidth = 10;
      context.beginPath();
      context.arc(centerX, centerY, 124, 0, Math.PI * 2);
      context.fill();
      context.stroke();
      context.restore();

      drawCircleImage(context, avatarImage, centerX, centerY, 112);

      context.save();
      context.fillStyle = "#59A8F7";
      context.beginPath();
      context.arc(729, 458, 29, 0, Math.PI * 2);
      context.fill();
      context.lineWidth = 5;
      context.strokeStyle = "#FFFFFF";
      context.stroke();
      context.strokeStyle = "#FFFFFF";
      context.lineWidth = 4;
      context.lineCap = "round";
      context.beginPath();
      context.moveTo(717, 458);
      context.lineTo(729, 470);
      context.lineTo(741, 446);
      context.stroke();
      context.restore();

      context.save();
      context.fillStyle = "#1C232C";
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.font = `700 66px ${FONT_STACK}`;
      context.fillText("张奕鑫", centerX, 839);
      context.restore();
    }

    function drawInfoPanel(context) {
      shadowCard(context, 104, 903, 998, 690, 28, "#FAFBFF");

      const rows = [
        { label: "访客姓名", value: "张奕鑫", y: 1012 },
        { label: "车辆信息", value: "闽DA71760", y: 1181 },
        { label: "进入校区", value: "旗山北区", y: 1350 },
        { label: "访客单位", value: "福建理工大学", y: 1519 }
      ];

      rows.forEach((row) => {
        fillRoundRect(context, 156, row.y - 43, 8, 84, 4, "#68C6DD");

        context.save();
        context.fillStyle = "#8C92A2";
        context.textAlign = "left";
        context.textBaseline = "middle";
        context.font = `500 48px ${FONT_STACK}`;
        context.fillText(row.label, 196, row.y);
        context.restore();

        context.save();
        context.fillStyle = "#1D232C";
        context.textAlign = "right";
        context.textBaseline = "middle";
        context.font = `700 54px ${FONT_STACK}`;
        context.fillText(row.value, 1017, row.y);
        context.restore();
      });
    }

    function drawTimeBox(context, x, y, timeLines) {
      shadowCard(context, x, y, 320, 178, 24, "#FFFFFF");
      drawClockIcon(context, x + 38, y + 67, 15);

      const topFontSize = 44;
      const bottomFontSize = 44;

      context.save();
      context.fillStyle = "#2D3440";
      context.textAlign = "left";
      context.textBaseline = "top";
      context.font = `700 ${topFontSize}px ${FONT_STACK}`;
      context.fillText(timeLines.top, x + 72, y + 36);
      context.font = `700 ${bottomFontSize}px ${FONT_STACK}`;
      context.fillText(timeLines.bottom, x + 72, y + 98);
      context.restore();
    }

    function drawTimePanel(context) {
      const now = new Date();
      const start = new Date(now.getTime() - 60 * 60 * 1000);
      const end = new Date(now.getTime() + 24 * 60 * 60 * 1000);

      const startLines = formatDateLines(start);
      const endLines = formatDateLines(end);

      const panelGradient = context.createLinearGradient(140, 1660, 1060, 1660);
      panelGradient.addColorStop(0, "#F2F7FF");
      panelGradient.addColorStop(1, "#F6F2FE");
      fillRoundRect(context, 140, 1660, 920, 390, 32, panelGradient);

      context.save();
      context.fillStyle = "#16A0D6";
      context.textAlign = "left";
      context.textBaseline = "middle";
      context.font = `700 40px ${FONT_STACK}`;
      context.fillText("通行时间", 200, 1740);
      context.restore();

      drawTimeBox(context, 196, 1802, startLines);
      drawArrow(context, 603, 1891);
      drawTimeBox(context, 688, 1802, endLines);
    }

    let animationFrameId = null;

    function render(timestamp = 0) {
      if (!bgImage.complete || !avatarImage.complete) {
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
      drawAvatarSection(ctx, timestamp);
      drawInfoPanel(ctx);
      drawTimePanel(ctx);
    }

    function startAnimation() {
      if (animationFrameId !== null) {
        return;
      }

      const animate = (timestamp) => {
        render(timestamp);
        animationFrameId = window.requestAnimationFrame(animate);
      };

      animationFrameId = window.requestAnimationFrame(animate);
    }

    function waitForImages() {
      return Promise.all([
        bgImage.decode ? bgImage.decode().catch(() => {}) : Promise.resolve(),
        avatarImage.decode ? avatarImage.decode().catch(() => {}) : Promise.resolve()
      ]).then(() => {
        render(performance.now());
        startAnimation();
      });
    }

    bgImage.addEventListener("load", () => render(performance.now()));
    avatarImage.addEventListener("load", () => render(performance.now()));
    window.addEventListener("load", waitForImages);
    window.addEventListener("resize", () => render(performance.now()));
  </script>
</body>
</html>
